<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Wrap Sort - Mobile Prototype</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0f172a; color: #f8fafc; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #canvas-wrapper { border: 4px solid #334155; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 10px; width: 340px; display: flex; justify-content: space-between; padding: 10px; pointer-events: none; }
        .stat { background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 8px; font-size: 14px; font-weight: bold; border: 1px solid #f472b6; }
        .back-btn { position: absolute; bottom: 20px; padding: 10px 20px; background: #334155; color: #f8fafc; text-decoration: none; border-radius: 30px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat" id="goal-text">Match the Pattern</div>
        <div class="stat" id="moves-text">Moves: 0</div>
    </div>
    <div id="canvas-wrapper"></div>
    <a href="pack2.html" class="back-btn">← Back to Menu</a>

    <script>
        let grid = [];
        let targetGrid = [];
        let gridSize = 5;
        let cellSize = 60;
        let palette = ['#f43f5e', '#10b981', '#3b82f6', '#eab308'];
        let moves = 0;
        let gameState = 'playing';
        let selected = null;

        function setup() {
            let canvas = createCanvas(360, 640);
            canvas.parent('canvas-wrapper');
            
            // Random Grid
            for (let x = 0; x < gridSize; x++) {
                grid[x] = [];
                for (let y = 0; y < gridSize; y++) {
                    grid[x][y] = floor(random(palette.length));
                }
            }

            // Create target pattern (center 3x3)
            // To ensure it's solvable, we'll just copy current state and scramble it
            targetGrid = [];
            for (let x = 0; x < 3; x++) {
                targetGrid[x] = [];
                for (let y = 0; y < 3; y++) {
                    targetGrid[x][y] = floor(random(palette.length));
                }
            }
        }

        function draw() {
            background(15, 23, 42);
            let offX = (width - gridSize * cellSize) / 2;
            let offY = 250;

            // Draw Target Pattern (Small)
            fill(30, 41, 59);
            rect(width/2 - 50, 80, 100, 100, 10);
            for(let x=0; x<3; x++) {
                for(let y=0; y<3; y++) {
                    fill(palette[targetGrid[x][y]]);
                    noStroke();
                    rect(width/2 - 40 + x * 28, 90 + y * 28, 24, 24, 4);
                }
            }
            textAlign(CENTER);
            fill(255, 150);
            textSize(10);
            text("TARGET", width/2, 195);

            // Draw Main Grid
            for (let x = 0; x < gridSize; x++) {
                for (let y = 0; y < gridSize; y++) {
                    let px = offX + x * cellSize;
                    let py = offY + y * cellSize;
                    
                    // Highlight center 3x3
                    if (x >= 1 && x <= 3 && y >= 1 && y <= 3) {
                        fill(palette[grid[x][y]]);
                        stroke(255, 100);
                        strokeWeight(2);
                    } else {
                        fill(palette[grid[x][y]] + '88');
                        noStroke();
                    }
                    rect(px + 4, py + 4, cellSize - 8, cellSize - 8, 8);
                }
            }

            document.getElementById('moves-text').innerText = `Moves: ${moves}`;

            if (checkWin() && gameState === 'playing') gameState = 'won';

            if (gameState !== 'playing') {
                fill(0, 180);
                rect(0, 0, width, height);
                fill(255);
                textAlign(CENTER);
                textSize(32);
                text("PATTERN MATCHED!", width/2, height/2 - 20);
                textSize(16);
                text("Tap to Restart", width/2, height/2 + 30);
                if (mouseIsPressed) location.reload();
            }
        }

        function checkWin() {
            for(let x=0; x<3; x++) {
                for(let y=0; y<3; y++) {
                    if (grid[x+1][y+1] !== targetGrid[x][y]) return false;
                }
            }
            return true;
        }

        function mousePressed() {
            if (gameState !== 'playing') return;
            let offX = (width - gridSize * cellSize) / 2;
            let offY = 250;
            let x = floor((mouseX - offX) / cellSize);
            let y = floor((mouseY - offY) / cellSize);
            
            if (x >= 0 && x < gridSize && y >= 0 && y < gridSize) {
                selected = { x, y, startX: mouseX, startY: mouseY, dragged: false };
            }
        }

        function mouseReleased() {
            if (!selected) return;
            
            let dx = mouseX - selected.startX;
            let dy = mouseY - selected.startY;
            
            if (abs(dx) > abs(dy)) {
                if (abs(dx) > 30) {
                    shiftRow(selected.y, dx > 0 ? 1 : -1);
                    moves++;
                }
            } else {
                if (abs(dy) > 30) {
                    shiftCol(selected.x, dy > 0 ? 1 : -1);
                    moves++;
                }
            }
            selected = null;
        }

        function shiftRow(y, dir) {
            let temp = [];
            for (let x = 0; x < gridSize; x++) temp[x] = grid[x][y];
            for (let x = 0; x < gridSize; x++) {
                let next = (x + dir + gridSize) % gridSize;
                grid[next][y] = temp[x];
            }
        }

        function shiftCol(x, dir) {
            let temp = [];
            for (let y = 0; y < gridSize; y++) temp[y] = grid[x][y];
            for (let y = 0; y < gridSize; y++) {
                let next = (y + dir + gridSize) % gridSize;
                grid[x][next] = temp[y];
            }
        }
    </script>
</body>
</html>
