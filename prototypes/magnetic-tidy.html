<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Tidy - Mobile Prototype</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0f172a; color: #f8fafc; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #canvas-wrapper { border: 4px solid #334155; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 10px; width: 340px; display: flex; justify-content: space-between; padding: 10px; pointer-events: none; }
        .stat { background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 8px; font-size: 14px; font-weight: bold; border: 1px solid #38bdf8; }
        .back-btn { position: absolute; bottom: 20px; padding: 10px 20px; background: #334155; color: #f8fafc; text-decoration: none; border-radius: 30px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat" id="goal-text">Goal: Sort 6 Balls</div>
        <div class="stat" id="time-text">Time: 60s</div>
    </div>
    <div id="canvas-wrapper"></div>
    <a href="pack1.html" class="back-btn">← Back to Menu</a>

    <script>
        let engine, world;
        let player;
        let items = [];
        let bins = [];
        let gameState = 'playing'; // 'playing', 'won', 'lost'
        let timer = 60;
        let sortedCount = 0;
        const GOAL = 6;
        const binColors = ['#ef4444', '#22c55e', '#3b82f6'];

        function setup() {
            let canvas = createCanvas(360, 640);
            canvas.parent('canvas-wrapper');
            engine = Matter.Engine.create();
            world = engine.world;
            engine.world.gravity.y = 0;

            player = { x: width/2, y: height/2, radius: 30 };

            // Bins at bottom
            for (let i = 0; i < binColors.length; i++) {
                bins.push({
                    x: (i + 0.5) * (width / binColors.length),
                    y: height - 60,
                    w: 100,
                    h: 80,
                    color: binColors[i],
                    count: 0
                });
            }

            // Random items
            for (let i = 0; i < 12; i++) {
                const colorIdx = floor(random(binColors.length));
                const body = Matter.Bodies.circle(random(50, width-50), random(100, height-200), 14, {
                    frictionAir: 0.1,
                    restitution: 0.5
                });
                body.renderColor = binColors[colorIdx];
                body.isMetallic = true;
                items.push(body);
                Matter.World.add(world, body);
            }

            // Walls
            const thick = 100;
            Matter.World.add(world, [
                Matter.Bodies.rectangle(width/2, -thick/2, width, thick, { isStatic: true }),
                Matter.Bodies.rectangle(width/2, height + thick/2, width, thick, { isStatic: true }),
                Matter.Bodies.rectangle(-thick/2, height/2, thick, height, { isStatic: true }),
                Matter.Bodies.rectangle(width + thick/2, height/2, thick, height, { isStatic: true })
            ]);
        }

        function draw() {
            background(15, 23, 42);
            Matter.Engine.update(engine);

            if (gameState === 'playing') {
                player.x = mouseX;
                player.y = mouseY;
                if (frameCount % 60 === 0) {
                    timer--;
                    if (timer <= 0) gameState = 'lost';
                }
                document.getElementById('time-text').innerText = `Time: ${timer}s`;
                document.getElementById('goal-text').innerText = `Goal: ${sortedCount}/${GOAL}`;
                if (sortedCount >= GOAL) gameState = 'won';
            }

            // Bins
            noStroke();
            for (let bin of bins) {
                fill(bin.color + '44');
                rect(bin.x - bin.w/2, bin.y - bin.h/2, bin.w, bin.h, 10);
                stroke(bin.color);
                strokeWeight(2);
                noFill();
                rect(bin.x - bin.w/2, bin.y - bin.h/2, bin.w, bin.h, 10);
                noStroke();
                fill(255);
                textAlign(CENTER);
                textSize(12);
                text(`${bin.count}`, bin.x, bin.y + 5);
            }

            // Items
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                if (mouseIsPressed && gameState === 'playing') {
                    let d = dist(player.x, player.y, item.position.x, item.position.y);
                    if (d < 250) {
                        let f = 0.003 * (1 - d/250);
                        let a = atan2(player.y - item.position.y, player.x - item.position.x);
                        Matter.Body.applyForce(item, item.position, { x: cos(a)*f, y: sin(a)*f });
                    }
                }

                // Clumping
                for (let other of items) {
                    if (item === other) continue;
                    let d = dist(item.position.x, item.position.y, other.position.x, other.position.y);
                    if (d < 50) {
                        let a = atan2(other.position.y - item.position.y, other.position.x - item.position.x);
                        Matter.Body.applyForce(item, item.position, { x: cos(a)*0.0001, y: sin(a)*0.0001 });
                    }
                }

                fill(item.renderColor);
                ellipse(item.position.x, item.position.y, 28);
                fill(255, 120);
                ellipse(item.position.x - 4, item.position.y - 4, 6);

                // Bin detection
                for (let bin of bins) {
                    if (dist(item.position.x, item.position.y, bin.x, bin.y) < 40) {
                        if (item.renderColor === bin.color) {
                            bin.count++;
                            sortedCount++;
                        }
                        Matter.World.remove(world, item);
                        items.splice(i, 1);
                        break;
                    }
                }
            }

            // Player Magnet
            fill(mouseIsPressed ? '#facc15' : '#475569');
            ellipse(player.x, player.y, 40);
            if (mouseIsPressed && gameState === 'playing') {
                noFill();
                stroke('#facc1555');
                ellipse(player.x, player.y, sin(frameCount*0.2)*100+100);
            }

            if (gameState !== 'playing') {
                fill(0, 180);
                rect(0, 0, width, height);
                fill(255);
                textAlign(CENTER);
                textSize(32);
                text(gameState === 'won' ? "LEVEL CLEAR!" : "TIME OVER!", width/2, height/2 - 20);
                textSize(16);
                text("Tap to Restart", width/2, height/2 + 30);
                if (mouseIsPressed) location.reload();
            }
        }
    </script>
</body>
</html>
