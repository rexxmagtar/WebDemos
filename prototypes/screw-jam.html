<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screw Jam 3D - Mobile Prototype</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0f172a; color: #f8fafc; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #canvas-wrapper { border: 4px solid #334155; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 10px; width: 340px; display: flex; justify-content: space-between; padding: 10px; pointer-events: none; }
        .stat { background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 8px; font-size: 14px; font-weight: bold; border: 1px solid #fbbf24; }
        .back-btn { position: absolute; bottom: 20px; padding: 10px 20px; background: #334155; color: #f8fafc; text-decoration: none; border-radius: 30px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat" id="goal-text">Unscrew All Bolts</div>
        <div class="stat" id="status-text">Match the Trays!</div>
    </div>
    <div id="canvas-wrapper"></div>
    <a href="pack2.html" class="back-btn">← Back to Menu</a>

    <script>
        let screws = [];
        let trays = [];
        let selectedScrew = null;
        let lastMouseAngle = 0;
        let colors = ['#f43f5e', '#10b981', '#3b82f6'];
        let trayWidth = 100;
        let gameState = 'playing';

        function setup() {
            let canvas = createCanvas(360, 640);
            canvas.parent('canvas-wrapper');
            
            // Define Screws
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 4; j++) {
                    screws.push({
                        x: 80 + i * 100,
                        y: 120 + j * 100,
                        color: colors[floor(random(colors.length))],
                        depth: 0,
                        rot: random(PI),
                        active: true,
                        falling: false
                    });
                }
            }

            // Define moving trays
            for (let i = 0; i < 4; i++) {
                trays.push({
                    x: i * (trayWidth + 20) + 20,
                    color: colors[i % colors.length]
                });
            }
        }

        function draw() {
            background(15, 23, 42);
            
            // Draw Moving Trays
            for (let t of trays) {
                t.x -= 1; // Move left
                if (t.x < -trayWidth) t.x = width + 20;
                
                fill(t.color + '44');
                stroke(t.color);
                strokeWeight(2);
                rect(t.x, height - 100, trayWidth, 60, 10);
                noStroke();
                fill(255);
                textAlign(CENTER);
                textSize(12);
                text("COLLECTOR", t.x + trayWidth/2, height - 65);
            }

            // Draw Board
            fill(30, 41, 59);
            rect(40, 80, 280, 420, 15);

            // Draw Screws
            for (let s of screws) {
                if (!s.active && !s.falling) continue;
                
                if (s.falling) {
                    s.y += 10;
                    if (s.y > height - 100) {
                        // Check if landed in matching tray
                        let landed = false;
                        for(let t of trays) {
                            if (s.x > t.x && s.x < t.x + trayWidth) {
                                if (s.color === t.color) {
                                    landed = true;
                                    break;
                                }
                            }
                        }
                        s.falling = false;
                        if (!landed) gameState = 'lost';
                    }
                }

                push();
                translate(s.x, s.y);
                
                // Shadow
                fill(0, 100);
                ellipse(5, 5, 50);
                
                // Screw head
                stroke(s.color);
                strokeWeight(4);
                fill(40);
                ellipse(0, 0, 54);
                
                // Indent
                rotate(s.rot + s.depth * 5);
                line(-15, 0, 15, 0);
                line(0, -15, 0, 15);
                
                // Depth indicator
                noFill();
                stroke(255, 50);
                strokeWeight(2);
                arc(0, 0, 40, 40, 0, map(s.depth, 0, 1, 0, TWO_PI));
                
                pop();
            }

            if (screws.every(s => !s.active && !s.falling) && gameState === 'playing') gameState = 'won';

            if (gameState !== 'playing') {
                fill(0, 180);
                rect(0, 0, width, height);
                fill(255);
                textAlign(CENTER);
                textSize(32);
                text(gameState === 'won' ? "JAM CLEARED!" : "MISSED TRAY!", width/2, height/2 - 20);
                textSize(16);
                text("Tap to Restart", width/2, height/2 + 30);
                if (mouseIsPressed) location.reload();
            }
        }

        function mousePressed() {
            if (gameState !== 'playing') return;
            for (let s of screws) {
                if (s.active && !s.falling && dist(mouseX, mouseY, s.x, s.y) < 30) {
                    selectedScrew = s;
                    lastMouseAngle = atan2(mouseY - s.y, mouseX - s.x);
                    return;
                }
            }
        }

        function mouseDragged() {
            if (!selectedScrew || gameState !== 'playing') return;
            
            let currentAngle = atan2(mouseY - selectedScrew.y, mouseX - selectedScrew.x);
            let delta = currentAngle - lastMouseAngle;
            if (delta > PI) delta -= TWO_PI;
            if (delta < -PI) delta += TWO_PI;
            
            selectedScrew.depth += abs(delta) * 0.05;
            lastMouseAngle = currentAngle;
            
            if (selectedScrew.depth >= 1) {
                selectedScrew.active = false;
                selectedScrew.falling = true;
                selectedScrew = null;
            }
        }

        function mouseReleased() {
            selectedScrew = null;
        }
    </script>
</body>
</html>
