<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnet Jam - Mobile Prototype</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #0f172a; color: #f1f5f9; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #canvas-wrapper { border: 4px solid #334155; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 10px; width: 340px; display: flex; justify-content: space-between; padding: 10px; pointer-events: none; }
        .stat { background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 8px; font-size: 14px; font-weight: bold; border: 1px solid #f43f5e; }
        .back-btn { position: absolute; bottom: 20px; padding: 10px 20px; background: #334155; color: #f8fafc; text-decoration: none; border-radius: 30px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat" id="goal-text">Match 3 Colors</div>
        <div class="stat" id="queue-text">Slots: 0/7</div>
    </div>
    <div id="canvas-wrapper"></div>
    <a href="pack1.html" class="back-btn">← Back to Menu</a>

    <script>
        let blocks = [];
        let queue = [];
        let colors = ['#f43f5e', '#10b981', '#3b82f6', '#eab308'];
        let gameState = 'playing';
        const MAX_QUEUE = 7;

        function setup() {
            let canvas = createCanvas(360, 640);
            canvas.parent('canvas-wrapper');
            
            // Grid of blocks on a conveyor
            for (let i = 0; i < 24; i++) {
                blocks.push({
                    x: (i % 4) * 70 + 75,
                    y: floor(i / 4) * 70 + 100,
                    targetX: (i % 4) * 70 + 75,
                    targetY: floor(i / 4) * 70 + 100,
                    color: colors[floor(random(colors.length))],
                    state: 'idle'
                });
            }
        }

        function draw() {
            background(15, 23, 42);
            
            // Queue Background
            fill(30, 41, 59);
            rect(20, height - 120, 320, 60, 10);
            for (let i = 0; i < MAX_QUEUE; i++) {
                stroke(255, 20);
                noFill();
                rect(30 + i * 45, height - 115, 40, 50, 5);
            }

            // Draw Blocks
            for (let b of blocks) {
                if (b.state === 'moving') {
                    b.x = lerp(b.x, b.targetX, 0.15);
                    b.y = lerp(b.y, b.targetY, 0.15);
                    if (dist(b.x, b.y, b.targetX, b.targetY) < 1) {
                        b.x = b.targetX;
                        b.y = b.targetY;
                        b.state = 'queued';
                        checkMatch();
                    }
                }
                
                fill(b.color);
                stroke(255, 30);
                strokeWeight(1);
                rectMode(CENTER);
                rect(b.x, b.y, 50, 50, 8);
                rectMode(CORNER);
            }

            // Draw Magnet
            push();
            translate(mouseX, mouseY);
            fill(200);
            noStroke();
            rect(-15, -10, 8, 30);
            rect(7, -10, 8, 30);
            arc(0, -10, 30, 30, PI, TWO_PI);
            fill(255, 0, 0);
            rect(-15, 15, 8, 10);
            rect(7, 15, 8, 10);
            pop();

            document.getElementById('queue-text').innerText = `Slots: ${queue.length}/${MAX_QUEUE}`;

            if (blocks.length === 0 && queue.length === 0) gameState = 'won';
            if (queue.length >= MAX_QUEUE && gameState === 'playing') gameState = 'lost';

            if (gameState !== 'playing') {
                fill(0, 180);
                rect(0, 0, width, height);
                fill(255);
                textAlign(CENTER);
                textSize(32);
                text(gameState === 'won' ? "CONVEYOR CLEAR!" : "JAMMED!", width/2, height/2 - 20);
                textSize(16);
                text("Tap to Restart", width/2, height/2 + 30);
                if (mouseIsPressed) location.reload();
            }
        }

        function checkMatch() {
            // Check for 3 of same color in queue
            let counts = {};
            for (let b of queue) {
                counts[b.color] = (counts[b.color] || 0) + 1;
            }
            
            for (let col in counts) {
                if (counts[col] >= 3) {
                    // Remove first 3 of this color
                    let found = 0;
                    for (let i = queue.length - 1; i >= 0; i--) {
                        if (queue[i].color === col && found < 3) {
                            let b = queue.splice(i, 1)[0];
                            // Remove from global blocks list
                            blocks = blocks.filter(bl => bl !== b);
                            found++;
                        }
                    }
                    // Re-sort queue positions
                    for (let i = 0; i < queue.length; i++) {
                        queue[i].targetX = 50 + i * 45;
                        queue[i].targetY = height - 90;
                        queue[i].state = 'moving';
                    }
                }
            }
        }

        function mousePressed() {
            if (gameState !== 'playing' || queue.length >= MAX_QUEUE) return;
            // Pull ALL blocks of the color clicked
            let target = null;
            for (let b of blocks) {
                if (b.state === 'idle' && dist(mouseX, mouseY, b.x, b.y) < 30) {
                    target = b;
                    break;
                }
            }

            if (target) {
                let col = target.color;
                // Pull blocks of this color that are "accessible" (on bottom row of grid or similar)
                // For simplicity here, just pull all of that color
                for (let b of blocks) {
                    if (b.state === 'idle' && b.color === col && queue.length < MAX_QUEUE) {
                        b.state = 'moving';
                        b.targetX = 50 + queue.length * 45;
                        b.targetY = height - 90;
                        queue.push(b);
                    }
                }
            }
        }
    </script>
</body>
</html>
